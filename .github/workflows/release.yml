name: release

# Every merge to main cuts a release: git-cliff computes the next semver from
# the conventional commits since the last tag, the workflow pushes that
# vX.Y.Z tag, builds the static musl binary, publishes a GitHub release
# with git-cliff release notes, and pushes the crate to crates.io via Trusted
# Publishing (OIDC; skipped quietly until this repo/workflow is registered as
# a trusted publisher for the crate on crates.io). If nothing releasable
# landed (only unconventional or chore(release) commits), the bumped version
# equals the latest tag and the run exits early.
#
# The crate version in Cargo.toml stays at its committed value; the binary is
# stamped with the tag version at build time so `powerline-claude --version`
# reports the released version.

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write # crates.io Trusted Publishing (OIDC)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Compute next version
        id: bump
        run: |
          next="$(git cliff --bumped-version)"
          latest="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          if [ "$next" = "$latest" ]; then
            echo "Nothing to release: bumped version $next equals the latest tag."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing $next (previous: ${latest:-none})."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render release notes
        if: steps.bump.outputs.skip == 'false'
        run: |
          git cliff --unreleased --tag "${{ steps.bump.outputs.next }}" -o release-notes.md
          cat release-notes.md

      - name: Install musl target
        if: steps.bump.outputs.skip == 'false'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Test
        if: steps.bump.outputs.skip == 'false'
        run: cargo test --locked

      - name: Build static binary
        if: steps.bump.outputs.skip == 'false'
        run: |
          version="${{ steps.bump.outputs.next }}"
          sed -i "s/^version = \".*\"/version = \"${version#v}\"/" Cargo.toml
          cargo build --release --target x86_64-unknown-linux-musl
          mkdir -p release
          cp target/x86_64-unknown-linux-musl/release/powerline-claude \
            release/powerline-claude-x86_64-unknown-linux-musl
          cd release
          sha256sum * > checksums.txt
          ls -l

      - name: Push tag
        if: steps.bump.outputs.skip == 'false'
        run: |
          git tag "${{ steps.bump.outputs.next }}"
          git push origin "${{ steps.bump.outputs.next }}"

      - name: Publish release
        if: steps.bump.outputs.skip == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.next }}
          body_path: release-notes.md
          files: release/*

      # Exchanges the run's OIDC identity for a short-lived crates.io token
      # (Trusted Publishing — no long-lived secret). continue-on-error keeps
      # the release green until the repo is registered as a trusted publisher
      # for the crate on crates.io.
      - name: Authenticate with crates.io
        id: crates-auth
        if: steps.bump.outputs.skip == 'false'
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1

      # Publishes the crate with the same stamped version as the tag.
      # --allow-dirty because the version stamp above edits Cargo.toml in place.
      - name: Publish to crates.io
        if: steps.bump.outputs.skip == 'false' && steps.crates-auth.outcome == 'success'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: cargo publish --allow-dirty
