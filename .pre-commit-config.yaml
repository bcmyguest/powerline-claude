repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace      # strip trailing whitespace
      - id: end-of-file-fixer        # ensure exactly one trailing newline
      - id: mixed-line-ending        # normalize line endings (LF)
        args: [--fix=lf]
      - id: check-yaml               # validate YAML syntax
      - id: check-toml               # validate TOML syntax
      - id: check-json               # validate JSON syntax
      - id: check-added-large-files  # block accidental large blobs
      - id: check-merge-conflict     # block leftover conflict markers
      - id: check-case-conflict      # catch case-insensitive filename clashes

  # Conventional Commits — release.yml derives the version bump from these.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 3db014c16a9d31997ab8c07a4d61fcce936c8f0d  # frozen: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Rust checks run from the local toolchain, mirroring ci.yml.
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --check --
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
